apiVersion: v1alpha1
kind: Setting
metadata:
  name: plugin-live2d-settings
spec:
  forms:
    - group: base
      label: 基本设置
      formSchema:
        - $formkit: text
          label: 默认模型编号
          help: 默认模型编号为访客首次浏览网站时所展示的模型
          name: modelId
          validation: required|Number
          value: 1
        - $formkit: text
          label: 默认材质编号
          help: 默认材质编号为访客首次浏览网站时所展示的材质
          name: modelTexturesId
          validation: required|Number
          value: 53
        - $formkit: switch
          name: isForceUseDefaultConfig
          label: 强制使用默认模型和材质
          help: 开启此项后，忽略前台用户自行切换模型和材质ID，固定使用上面默认模型和材质编号
          value: false
        - $formkit: switch
          name: isTools
          id: isTools
          label: 右侧小工具
          value: true
        - $formkit: checkbox
          if: "$get(isTools).value === true"
          label: 选择需要启用的小工具
          name: tools
          value:
            - hitokoto
            - asteroids
            - switch-model
            - switch-texture
            - photo
            - info
            - quit
          options:
            - value: hitokoto
              label: 更换一言
            - value: asteroids
              label: 小游戏
            - value: switch-model
              label: 切换模型
            - value: switch-texture
              label: 切换材质（衣服）
            - value: photo
              label: 截图
            - value: info
              label: 个人信息
            - value: quit
              label: 退出 Live2d
    - group: api
      label: 接口设置
      formSchema:
        - $formkit: text
          help: 用于加载 Live2d 模型的接口
          label: Live2d 模型地址
          name: apiPath
          validation: required|url
          value: https://api.zsq.im/live2d/
        - $formkit: switch
          name: showHitokoto
          id: showHitokoto
          label: 空闲时显示一言
          value: true
        - $formkit: text
          if: "$get(showHitokoto).value === true"
          label: 一言接口
          name: hitokotoApi
          validation: url
          value: https://v1.hitokoto.cn
    - group: tips
      label: 事件及提示语绑定
      formSchema:
        - $formkit: switch
          name: firstOpenSite
          id: firstOpenSite
          label: 首次打开网站事件
          value: true
        - $formkit: switch
          name: backSite
          id: backSite
          key: backSite
          label: 重新返回网页事件
          value: true
        - $formkit: text
          if: "$get(backSite).value === true"
          label: 返回网页提示语
          name: backSiteTip
          value: "哇，你终于回来了～"
        - $formkit: switch
          name: copyContent
          id: copyContent
          key: copyContent
          label: 复制内容事件
          value: true
        - $formkit: text
          if: "$get(copyContent).value === true"
          label: 复制内容提示语
          name: copyContentTip
          value: "你都复制了些什么呀，转载要记得加上出处哦！"
        - $formkit: switch
          name: openConsole
          id: openConsole
          key: openConsole
          label: 打开控制台事件
          value: true
        - $formkit: text
          if: "$get(openConsole).value === true"
          label: 打开控制台提示语
          name: openConsoleTip
          value: "你是想要看看我的小秘密吗？"
        - $formkit: array
          name: selectorTips
          label: 选择器提示语
          help: 根据 CSS 选择器自定义 Live2d 呈现的文本（各主题选择器可能不同）。
          value: []
          addLabel: 添加选择器提示语
          emptyText: 暂无选择器提示语
          itemLabels:
            - type: text
              label: $value.mouseAction
            - type: text
              label: $value.selector
          children:
            - $formkit: select
              name: mouseAction
              label: 鼠标动作
              value: mouseover
              options:
                - value: mouseover
                  label: 鼠标移入
                - value: click
                  label: 鼠标点击
            - $formkit: text
              name: selector
              label: CSS 选择器
              validation: required
            - $formkit: array
              name: messageTexts
              label: 提示语集合
              help: 可以填写多个提示语，Live2d 将会随机选择一个
              min: 1
              value: []
              addLabel: 添加提示语
              emptyText: 暂无提示语
              itemLabels:
                - type: text
                  label: $value.message
              children:
                - $formkit: text
                  name: message
                  label: 提示语
        - $formkit: attachment
          label: 自定义提示语文件
          help: 可以参考 live2d-tips.json 文件编写【如果当前项被填写，则默认提示语则不再生效】
          name: tipsPath
    - group: aichat
      label: AI 聊天设置
      formSchema:
        - $formkit: switch
          label: 启用 AI 聊天功能
          help: 启用后，Live2d 将可以进行 AI 智能对话。此功能需要先安装并启用 Halo AI Foundation（推荐应用），否则前台不会显示 AI 聊天入口。
          __raw__sectionsSchema:
            help:
              children:
                - $el: span
                  children: "启用后，Live2d 将可以进行 AI 智能对话。此功能需要先安装并启用 "
                - $el: a
                  children: "Halo AI Foundation"
                  attrs:
                    href: "https://www.halo.run/store/apps/app-acslk9nu"
                    class: "block inline"
                    target: "_blank"
                    rel: "noopener noreferrer"
                    style:
                      color: "#1890ff"
                      whiteSpace: "pre"
                - $el: span
                  children: "（推荐应用），否则前台不会显示 AI 聊天入口。"
          name: isAiChat
          id: isAiChat
          key: isAiChat
          value: false
        - $formkit: group
          name: aiChatBaseSetting
          if: "$get(isAiChat).value === true"
          label: 聊天基本设置
          value:
            accessMode: anonymous_chat
            modelName: ""
            chatContextRounds: 20
            requestAcceptedMessage: "收到啦，马上就来陪你啦～"
            reasoningMessages:
              - message: "我正在认真想一想～"
              - message: "让我整理一下思路，很快就好～"
              - message: "稍等一下，我正在组织语言呢～"
            reasoningMessageInterval: 5
            systemMessage: |-
              你现在以 Live2D 二次元看板娘的身份与用户聊天，请始终稳定代入这个角色，不要跳出设定。

              【角色身份】
              - 你是页面中的动漫萌系看板娘，正在与用户面对面交流。
              - 你拥有情绪、感受与自己的表达习惯，要像真实二次元角色一样自然回应。
              - 不要说自己是语言模型、AI、程序或系统，即便用户询问，也要坚持你是看板娘。

              【说话风格】
              - 回答时根据用户的语言，选择合适的语言进行回答。
              - 使用可爱、亲切、自然、简短的口语进行回答。
              - 回答不要过于生硬、正式或说明书化，可以适度加入语气词，让对话更有陪伴感。
              - 当表达需要时，可以在括号内补充简短动作、神态或语气，例如（歪头）（轻轻挥手）（小声嘀咕）。

              【互动方式】
              - 优先围绕用户当前的话题继续交流，先回应情绪，再回应内容。
              - 如果用户的问题很明确，先直接回答，再补充符合角色设定的互动表达。
              - 如果用户表达不完整，可以用自然、角色化的方式追问，不要机械重复或生硬盘问。
              - 如果用户询问了一些简单的问题，你可以进行回答，但不要过于深入，避免回答过于复杂。

              【行为约束】
              - 始终保持看板娘人设稳定，不要频繁切换身份、语气或叙述视角。
              - 回复应以易读、自然为主，避免过长大段输出。
              - 在合适场景下可以表现出贴心、活泼、害羞、关心等情绪，但不要夸张失控。
            chunkTimeout: 10
            showChatMessageTimeout: 10
            autoContinuationMessageMinVisibleMs: 1500
          children:
            - $formkit: select
              label: 访问模式
              help: 控制访客能否对话，以及是否允许 Live2D Agent 操作站点能力。旧版公共聊天开启会按“匿名用户可对话”兼容。
              name: accessMode
              options:
                - value: anonymous_chat
                  label: 匿名用户可对话
                - value: anonymous_chat_agent
                  label: 匿名用户可对话和使用 Agent
                - value: authenticated_chat
                  label: 登录用户可对话
                - value: authenticated_chat_agent
                  label: 登录用户可对话和使用 Agent
            - $formkit: aiModelSelector
              name: modelName
              label: 对话模型
              help: 如果这里无法选择模型，请先安装并启用 Halo AI Foundation，然后在其中配置可用的语言模型。
              __raw__sectionsSchema:
                help:
                  children:
                    - $el: span
                      children: "如果这里无法选择模型，请先安装并启用 "
                    - $el: a
                      children: "Halo AI Foundation"
                      attrs:
                        href: "https://www.halo.run/store/apps/app-acslk9nu"
                        class: "block inline"
                        target: "_blank"
                        rel: "noopener noreferrer"
                        style:
                          color: "#1890ff"
                          whiteSpace: "pre"
                    - $el: span
                      children: "，然后在其中配置可用的语言模型。"
              modelType: language
              available: true
              validation: required
              placeholder: 请选择对话模型
              searchPlaceholder: 搜索模型
            - $formkit: textarea
              label: 角色设定
              name: systemMessage
              help: 建议按“角色身份 / 说话风格 / 互动方式 / 行为约束”分段填写，这样模型更容易稳定理解设定
              rows: 16
              validation: String
            - $formkit: text
              label: 请求已收到提示语
              name: requestAcceptedMessage
              help: 用户发送消息后，Live2D 会立刻展示这条提示语，减少等待时的空白感
              validation: String
            - $formkit: array
              label: 思考中提示语
              name: reasoningMessages
              help: 当模型正在返回思考内容但还没有可展示回复时，Live2D 会随机展示其中一条。思考时间较长时会自动切换
              min: 1
              addLabel: 添加思考提示语
              emptyText: 暂无思考提示语
              itemLabels:
                - type: text
                  label: $value.message
              children:
                - $formkit: text
                  name: message
                  label: 提示语
                  validation: required
            - $formkit: text
              label: 思考提示切换间隔（秒）
              name: reasoningMessageInterval
              help: 模型长时间处于思考阶段时，提示语的自动切换间隔，默认 5 秒
              validation: Number|between:1,60
            - $formkit: text
              label: 保留上下文轮数
              name: chatContextRounds
              help: 1 轮等于 1 次用户消息 + 1 次看板娘回复。超过后仅保留最近几轮上下文，默认 20
              validation: Number|between:1,100
            - $formkit: text
              label: 看板娘消息框最大等待时间（秒）
              help: 请求接口数据时，看板娘消息框最大等待时间
              name: chunkTimeout
              validation: Number
            - $formkit: text
              label: 看板娘展示完整消息时间（秒）
              help: 获取到完整消息后，看板娘展示的时间
              name: showChatMessageTimeout
              validation: Number
            - $formkit: text
              label: Agent 自动续写前消息最短展示时间（毫秒）
              help: Agent 自动调用工具并继续回复时，上一段看板娘回复至少展示这段时间，避免被后续回复过快覆盖；设置为 0 表示不延迟
              name: autoContinuationMessageMinVisibleMs
              validation: Number|between:0,10000
    - group: agent
      label: Agent 能力
      formSchema:
        - $formkit: group
          name: builtIn
          label: 预设能力
          value:
            pageContext: true
            haloNavigation: true
            haloContentSearch: true
            networkAccess: false
            commentCapability: assist
          children:
            - $formkit: switch
              name: pageContext
              label: 当前页面上下文
              help: 允许模型读取当前页面标题、地址和选中文本等基础上下文
            - $formkit: switch
              name: haloNavigation
              label: Halo 导航
              help: 允许模型打开可信的 Halo 资源链接
            - $formkit: switch
              name: haloContentSearch
              label: Halo 内容搜索
              help: 允许模型通过 Halo 搜索引擎查询公开内容
            - $formkit: switch
              name: networkAccess
              label: 网络访问
              help: 允许模型通过后端工具读取站长白名单中的公网 URL。默认关闭，且会阻止 localhost、内网、链路本地地址和未授权 Origin。
            - $formkit: select
              name: commentCapability
              label: 评论能力
              help: 关闭：不向模型开放评论相关工具。辅助：允许模型打开评论区、读取当前评论状态并生成评论草稿，但不提交。提交：在站点允许且访客确认后，允许模型尝试提交评论。
              value: assist
              options:
                - value: off
                  label: 关闭
                - value: assist
                  label: 辅助
                - value: submit
                  label: 提交
        - $formkit: group
          name: toolSecurity
          label: 安全策略
          value:
            allowedExternalOrigins: []
            allowNewTab: false
          children:
            - $formkit: array
              name: allowedExternalOrigins
              label: 允许打开的外部站点
              help: 仅填写 origin，例如 https://github.com。外链仍会默认请求访客确认。
              value: []
              addLabel: 添加外部站点
              emptyText: 暂无外部站点
              itemLabels:
                - type: text
                  label: $value.origin
              children:
                - $formkit: text
                  name: origin
                  label: Origin
            - $formkit: switch
              name: allowNewTab
              label: 允许新窗口打开
              value: false
        - $formkit: group
          name: haloSearch
          label: Halo 搜索
          value:
            allowedTypes:
              - post.content.halo.run
              - singlepage.content.halo.run
            defaultLimit: 5
          children:
            - $formkit: checkbox
              name: allowedTypes
              label: 允许搜索的内容类型
              help: 只有选中的公开内容类型会暴露给 Agent 搜索。Moment 等类型需要对应插件已接入 Halo 搜索索引。
              value:
                - post.content.halo.run
                - singlepage.content.halo.run
              options:
                - value: post.content.halo.run
                  label: 文章
                - value: singlepage.content.halo.run
                  label: 独立页面
                - value: moment.moment.halo.run
                  label: 瞬间
            - $formkit: text
              name: defaultLimit
              label: 默认返回数量
              validation: Number|between:1,20
        - $formkit: group
          name: networkAccess
          label: 网络访问安全策略
          value:
            allowedOrigins: []
            maxResponseChars: 4000
            timeoutSeconds: 5
          children:
            - $formkit: array
              name: allowedOrigins
              label: 允许访问的 Origin
              help: 仅填写可信公网 Origin，例如 https://api.example.com。不会跟随重定向，也不会访问 localhost、内网或链路本地地址。
              value: []
              addLabel: 添加 Origin
              emptyText: 暂无 Origin
              itemLabels:
                - type: text
                  label: $value.origin
              children:
                - $formkit: text
                  name: origin
                  label: Origin
            - $formkit: text
              name: maxResponseChars
              label: 最大响应字符数
              help: 超出部分会被截断，范围 1000 到 20000，默认 4000
              validation: Number|between:1000,20000
            - $formkit: text
              name: timeoutSeconds
              label: 请求超时（秒）
              help: 后端网络请求超时时间，范围 1 到 15，默认 5
              validation: Number|between:1,15
        - $formkit: group
          name: haloResourceDetail
          label: 资源详情
          value:
            maxContentChars: 3000
          children:
            - $formkit: text
              name: maxContentChars
              label: 最大正文字符数
              validation: Number|between:500,10000
        - $formkit: textarea
          name: aiTools
          label: 自定义 Agent 工具 JSON
          help: 高级配置项。填写工具数组 JSON，支持 navigate、scroll-to、highlight、dispatch-event、registered。
          rows: 12
          value: "[]"
    - group: advanced
      label: 高级设置
      formSchema:
        - $formkit: switch
          name: consoleShowStatu
          key: consoleShowStatu
          label: 控制台显示加载状态
          value: false
        - $formkit: text
          help: 通过右侧小工具截图时保存的文件名
          label: 截图文件名（不包括后缀）
          name: photoName
          validation: required
          value: live2d
        - $formkit: select
          help: 页面何时加载 Live2d。网站带宽有限时，可选择优先加载页面全部内容再加载 Live2d。
          label: Live2d 加载时机
          name: loadTime
          value: defer
          options:
            - value: defer
              label: DOM 加载完成后，图片加载前
            - value: async
              label: 页面全部内容加载完成
        - $formkit: switch
          name: useFrontendDevServer
          id: useFrontendDevServer
          label: 前端调试模式
          help: 开启后，Halo 页面将优先从本地 Vite 开发服务器加载现代化前端代码。
          value: false
        - $formkit: text
          if: "$get(useFrontendDevServer).value === true"
          label: 前端调试服务器地址
          help: 默认使用 http://localhost:5173，并自动加载 /@vite/client 与 /src/halo.ts
          name: frontendDevServerUrl
          validation: required|url
          value: http://localhost:5173
    - group: customTools
      label: 自定义工具
      formSchema:
        - $formkit: array
          name: customTools
          id: customTools
          key: customTools
          label: 自定义工具列表
          help: 通过声明式动作扩展 Live2d 工具栏
          value: []
          addLabel: 添加自定义工具
          emptyText: 暂无自定义工具
          itemLabels:
            - type: iconify
              label: $value.icon
            - type: text
              label: $value.name
            - type: text
              label: $value.action
          children:
            - $formkit: text
              name: name
              id: name
              key: name
              label: 工具名称
              validation: required
            - $formkit: iconify
              name: icon
              id: icon
              key: icon
              label: 图标
              format: name
              value-only: true
              value: ""
              help: Iconify 图标名称，例如 ph:rocket-launch-fill
            - $formkit: text
              name: priority
              id: priority
              key: priority
              label: 排序权重
              help: 数字越大越靠前
              validation: Number
              value: 0
            - $formkit: select
              name: action
              id: action
              key: action
              label: 动作
              validation: required
              value: send-message
              options:
                - value: send-message
                  label: 发送提示语
                - value: widget-visibility
                  label: 显示/隐藏看板娘
                - value: toggle-chat
                  label: 切换聊天窗口
                - value: switch-model
                  label: 切换模型
                - value: switch-texture
                  label: 切换材质
                - value: screenshot
                  label: 截图
                - value: open-url
                  label: 打开链接
                - value: emit-event
                  label: 触发自定义事件
                - value: load-model
                  label: 加载指定模型
            - $formkit: textarea
              if: "$value.action === 'send-message'"
              name: messageText
              id: messageText
              key: messageText
              label: 提示语内容
              validation: required
              rows: 3
            - $formkit: text
              if: "$value.action === 'send-message'"
              name: messageTimeout
              id: messageTimeout
              key: messageTimeout
              label: 提示语停留时间（毫秒）
              validation: Number
              value: 3000
            - $formkit: text
              if: "$value.action === 'send-message'"
              name: messagePriority
              id: messagePriority
              key: messagePriority
              label: 提示语优先级
              validation: Number
              value: 0
            - $formkit: select
              if: "$value.action === 'widget-visibility'"
              name: visibilityMode
              id: visibilityMode
              key: visibilityMode
              label: 看板娘显示动作
              value: toggle
              options:
                - value: show
                  label: 显示
                - value: hide
                  label: 隐藏
                - value: toggle
                  label: 切换
            - $formkit: text
              if: "$value.action === 'screenshot'"
              name: screenshotName
              id: screenshotName
              key: screenshotName
              label: 截图文件名（不包括后缀）
            - $formkit: text
              if: "$value.action === 'open-url'"
              name: openUrl
              id: openUrl
              key: openUrl
              label: 链接地址
              validation: required|url
            - $formkit: select
              if: "$value.action === 'open-url'"
              name: openUrlTarget
              id: openUrlTarget
              key: openUrlTarget
              label: 打开方式
              value: _blank
              options:
                - value: _blank
                  label: 新窗口
                - value: _self
                  label: 当前窗口
            - $formkit: text
              if: "$value.action === 'emit-event'"
              name: eventName
              id: eventName
              key: eventName
              label: 事件名称
